<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>discord_to_insta</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root { --bg: #1a1a1c; --fg: #e8e8ea; --muted: #8a8a92; --accent: #7aa2f7; --ok: #4ade80; --warn: #fbbf24; --err: #f87171; --panel: #23232a; --border: #30303a; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    .topbar { display: flex; align-items: center; gap: 16px; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .topbar b { font-size: 15px; }
    .topbar .muted { color: var(--muted); }
    .topbar .chip { padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px; font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
    .layout { display: grid; grid-template-columns: 300px 1fr 260px 300px; gap: 1px; background: var(--border); min-height: calc(100vh - 52px - 140px); }
    .panel { background: var(--bg); padding: 12px; overflow: auto; }
    .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 0 0 8px; font-weight: 600; }
    button { background: var(--panel); color: var(--fg); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #0c0c0e; border-color: var(--accent); }
    input, textarea { background: var(--panel); color: var(--fg); border: 1px solid var(--border); padding: 6px 8px; border-radius: 4px; font-size: 13px; font-family: inherit; width: 100%; }
    textarea { font-family: ui-monospace, Menlo, monospace; font-size: 12px; resize: none; }
    .msg-list .msg { padding: 8px; border-radius: 4px; cursor: pointer; margin-bottom: 4px; }
    .msg-list .msg:hover { background: var(--panel); }
    .msg-list .msg.selected { background: var(--panel); border-left: 2px solid var(--accent); }
    .msg-list .msg .meta { font-size: 11px; color: var(--muted); }
    .msg-list .msg .preview { font-size: 12px; margin-top: 2px; color: var(--fg); overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-family: ui-monospace, Menlo, monospace; }
    .badge.ok { background: rgba(74, 222, 128, 0.15); color: var(--ok); }
    .badge.warn { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
    .badge.err { background: rgba(248, 113, 113, 0.15); color: var(--err); }
    .badge.muted { background: var(--panel); color: var(--muted); }
    .handle-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 4px; margin-bottom: 4px; }
    .handle-row button { padding: 4px 8px; }
    .log { background: var(--panel); border-top: 1px solid var(--border); padding: 8px 16px; height: 140px; overflow: auto; font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
    .log .line { padding: 1px 0; }
    .log .line.err { color: var(--err); }
    .log .line.ok { color: var(--ok); }
    .hx-indicator { display: none; }
    .htmx-request .hx-indicator { display: inline; }
    .htmx-request.hx-indicator { display: inline; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .image-preview img { max-width: 100%; border-radius: 4px; border: 1px solid var(--border); }
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 2px; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .char-counter { font-size: 11px; color: var(--muted); font-family: ui-monospace, Menlo, monospace; }
    .char-counter.over { color: var(--err); }
  </style>
</head>
<body>
  <div class="topbar">
    <b>discord_to_insta</b>
    <span class="muted">bot:</span><span id="gateway-status"
      hx-get="/api/gateway/status" hx-trigger="load, every 5s">…</span>
    <span class="muted">channel:</span><span class="chip" id="channel-id-chip">…</span>
    <span class="muted">guild:</span><span class="chip" id="guild-id-chip">…</span>
    <button hx-post="/api/fetch"
            hx-target="#message-list"
            hx-indicator="#fetch-indicator"
            hx-trigger="click, load delay:200ms, every 30s"
            class="primary">Fetch recent</button>
    <span id="fetch-indicator" class="hx-indicator badge muted">fetching…</span>
    <span style="flex:1"></span>
    <label class="row" style="margin:0">
      <input type="checkbox" id="poller-toggle"
        hx-post="/api/poller/toggle"
        hx-target="#poller-status"
        hx-swap="innerHTML"
        style="width:auto">
      auto-react
    </label>
    <span id="poller-status" class="badge muted"
      hx-get="/api/poller/status" hx-trigger="load">…</span>
  </div>

  <div class="layout">
    <div class="panel" id="messages-panel">
      <h2>Recent messages</h2>
      <div id="message-list" class="msg-list">
        <p class="muted">Click <b>Fetch recent</b> to load messages.</p>
      </div>
    </div>

    <div class="panel" id="convert-panel">
      <h2>Convert</h2>
      <form id="convert-form"
        hx-post="/api/preview"
        hx-target="#preview-output"
        hx-trigger="input changed delay:300ms from:find textarea, input changed delay:300ms from:find input, click from:find button[type=submit]"
        hx-swap="innerHTML">
        <div class="two-col">
          <div>
            <label>Discord source</label>
            <textarea name="raw" rows="26" placeholder="Pick a message on the left, or paste one here…"></textarea>
          </div>
          <div>
            <label>Instagram caption <span class="char-counter" id="char-counter"></span></label>
            <div id="preview-output">
              <textarea readonly rows="26" placeholder="Preview will appear here…"></textarea>
            </div>
          </div>
        </div>
      </form>
    </div>

    <div class="panel" id="image-panel">
      <h2>Post image</h2>
      <div id="image-preview" class="image-preview">
        <p class="muted">Paste a message with <code>Distance : Nkm</code> to auto-pick.</p>
      </div>
    </div>

    <div class="panel" id="handles-panel">
      <h2>ID → Instagram handle</h2>
      <p class="muted" style="font-size:11px">Mentions not in this table are removed.</p>
      <div id="handle-rows">
        <div class="handle-row">
          <input name="handle_id_0" placeholder="Discord user ID" form="convert-form">
          <input name="handle_user_0" placeholder="@handle" form="convert-form">
          <button type="button" onclick="this.parentElement.remove(); htmx.trigger('#convert-form', 'input')">✕</button>
        </div>
      </div>
      <button type="button" onclick="addHandleRow()">+ add row</button>
    </div>
  </div>

  <div class="log" id="poller-log"
    hx-get="/api/poller/log" hx-trigger="load, every 3s" hx-swap="innerHTML">
    <span class="muted">log loading…</span>
  </div>

  <script>
    let handleRowCounter = 1;
    function addHandleRow() {
      const container = document.getElementById('handle-rows');
      const row = document.createElement('div');
      row.className = 'handle-row';
      row.innerHTML = `
        <input name="handle_id_${handleRowCounter}" placeholder="Discord user ID" form="convert-form">
        <input name="handle_user_${handleRowCounter}" placeholder="@handle" form="convert-form">
        <button type="button" onclick="this.parentElement.remove(); htmx.trigger('#convert-form', 'input')">✕</button>
      `;
      container.appendChild(row);
      handleRowCounter++;
      // Re-initialize htmx on the newly injected inputs so the form trigger picks them up.
      htmx.process(row);
    }

    // Load initial config into the topbar chips.
    fetch('/api/config').then(r => r.json()).then(cfg => {
      document.getElementById('channel-id-chip').textContent = cfg.channel_id || '(unset)';
      document.getElementById('guild-id-chip').textContent = cfg.guild_id || '(unset)';
    });

    // Sync the auto-react checkbox with the real poller state. The server
    // auto-starts the poller on launch when DISCORD_BOT_TOKEN is set, so the
    // UI needs to reflect that without the user having to click. Also polls
    // every 5 s so manual CLI toggles or crashes surface in the UI.
    function syncPollerCheckbox() {
      fetch('/api/poller/running').then(r => r.text()).then(t => {
        document.getElementById('poller-toggle').checked = (t.trim() === '1');
      }).catch(() => {});
    }
    syncPollerCheckbox();
    setInterval(syncPollerCheckbox, 5000);

    // Clicking a message in the list fills the textarea and triggers preview.
    document.addEventListener('click', e => {
      const msg = e.target.closest('.msg');
      if (!msg) return;
      const content = msg.dataset.content;
      if (content == null) return;
      document.querySelectorAll('.msg-list .msg.selected').forEach(el => el.classList.remove('selected'));
      msg.classList.add('selected');
      // Remember on the container so auto-refresh can restore it.
      document.getElementById('message-list').dataset.selectedId = msg.dataset.id || '';
      const ta = document.querySelector('#convert-form textarea[name=raw]');
      ta.value = content;
      // Auto-seed handle rows from mention IDs in the data attribute.
      try {
        const mentionIds = JSON.parse(msg.dataset.mentions || '[]');
        for (const id of mentionIds) {
          const already = Array.from(document.querySelectorAll('#handle-rows input[name^=handle_id_]'))
            .some(inp => inp.value === id);
          if (!already) {
            addHandleRow();
            const rows = document.querySelectorAll('#handle-rows .handle-row');
            const last = rows[rows.length - 1];
            last.querySelector('input[name^=handle_id_]').value = id;
          }
        }
      } catch (_) { /* ignore */ }
      htmx.trigger('#convert-form', 'input');
    });

    // Poller toggle: when the checkbox changes, decide what hx-post sent; but
    // htmx already fires the POST. We just need the preflight to pass the desired
    // state. Use hx-vals via the checkbox's `checked` property.
    const toggle = document.getElementById('poller-toggle');
    toggle.addEventListener('htmx:configRequest', (e) => {
      e.detail.parameters['enabled'] = toggle.checked ? '1' : '0';
    });

    // Update the character counter whenever the preview updates.
    document.body.addEventListener('htmx:afterSwap', (e) => {
      if (e.target.id === 'preview-output') {
        const out = e.target.querySelector('textarea');
        const counter = document.getElementById('char-counter');
        if (out && counter) {
          const n = [...out.value].length;
          counter.textContent = `${n} / 2200`;
          counter.classList.toggle('over', n > 2200);
        }
      }
      // Re-apply selection highlight after the message list auto-refreshes
      // so the user doesn't lose their place mid-edit.
      if (e.target.id === 'message-list') {
        const selectedId = e.target.dataset.selectedId;
        if (selectedId) {
          const match = e.target.querySelector(`.msg[data-id="${CSS.escape(selectedId)}"]`);
          if (match) match.classList.add('selected');
        }
      }
    });
  </script>
</body>
</html>
