<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Connexion — L'Équipe du Soir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Archivo:ital,wght@0,300..900;1,300..900&family=Archivo+Narrow:wght@400;500;600;700&display=swap">
  <style>
    :root {
      --paper: #f2ede3;
      --ink: #141210;
      --ink-soft: #4a4238;
      --rule-strong: #7c6f55;
      --jaune-dark: #b88a0e;
      --red: #8c1c1c;
      --display: 'Bodoni Moda', serif;
      --sans: 'Archivo', sans-serif;
      --narrow: 'Archivo Narrow', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper);
      font-family: var(--sans);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 100;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08 0 0 0 0 0.07 0 0 0 0 0.06 0 0 0 0.45 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
      opacity: 0.38;
      mix-blend-mode: multiply;
    }
    .login-box {
      width: 340px;
      padding: 36px 32px;
      border: 2px solid var(--ink);
      text-align: center;
      background: var(--paper);
      position: relative;
      z-index: 1;
      animation: fadeIn 420ms ease-out both;
    }
    .login-box h1 {
      font-family: var(--display);
      font-weight: 900;
      font-style: italic;
      font-variation-settings: "opsz" 96;
      font-size: 28px;
      letter-spacing: -0.02em;
      margin: 0 0 4px;
    }
    .login-box .sub {
      font-family: var(--display);
      font-style: italic;
      font-size: 13px;
      color: var(--ink-soft);
      margin-bottom: 24px;
    }
    .login-box input {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--rule-strong);
      background: transparent;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--ink);
      outline: none;
      border-radius: 0;
      transition: border-color 160ms ease;
    }
    .login-box input:focus {
      border-color: var(--ink);
    }
    .login-box button {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: var(--ink);
      color: var(--paper);
      border: 0;
      font-family: var(--narrow);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 12px;
      cursor: pointer;
      transition: background 180ms ease, transform 120ms ease;
    }
    .login-box button:hover {
      background: var(--jaune-dark);
      color: var(--ink);
      transform: translate(-1px, -1px);
      box-shadow: 2px 2px 0 var(--ink);
    }
    .login-box button:active {
      transform: translate(0, 0);
      box-shadow: none;
    }
    .login-error {
      margin-bottom: 16px;
      padding: 8px 12px;
      border: 1.5px solid var(--red);
      color: var(--red);
      font-family: var(--narrow);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>L'Équipe du Soir</h1>
    <div class="sub">Accès au pupitre de composition</div>
    <!--ERROR-->
    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="Mot de passe" autofocus>
      <button type="submit">Entrer</button>
    </form>
  </div>
</body>
</html>
